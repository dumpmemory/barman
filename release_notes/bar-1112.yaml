---
- summary: Add cloud_delete_batch_size configuration option for cloud deletions
  description: |
    Introduced a new `cloud_delete_batch_size` configuration option that allows
    users to specify the batch size for cloud deletions. When set in the server
    configuration, this value is passed to the cloud storage client used for deletions.

    This option provides feature parity with the `--batch-size` argument from
    `barman-cloud-backup-delete` script and supports advanced and non-standard cloud
    workflows. If not set, the default cloud storage client behavior applies (`1000` for
    S3, `256` for Azure Blob, and `100` for GCS).

    Example configuration:
    ```
    [myserver]
    backup_method = local-to-cloud
    basebackups_directory = s3://my-bucket/barman/backups
    cloud_delete_batch_size = 500
    ```

    This change is part of the effort to unify cloud options between the main
    `barman` CLI and standalone `barman-cloud-*` scripts.
  type: minor_change
  jira_tickets:
    - BAR-1112
