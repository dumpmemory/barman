---
- summary: Add aws_encryption configuration option for S3 objects
  description: |
    Introduced a new `aws_encryption` configuration option that allows users to
    specify the server-side encryption method for S3 objects. When set in the server
    configuration, this value is passed to the S3 client for all commands that
    upload objects to cloud object storage.

    This option provides feature parity with the `--encryption` argument from
    `barman-cloud-backup` and `barman-cloud-wal-archive` scripts. If not set, no
    `barman-cloud-backup` and `barman-cloud-wal-archive` scripts. If not set, S3's default encryption settings for the bucket will be used.

    Example configuration:
    ```
    [myserver]
    backup_method = local-to-cloud
    basebackups_directory = s3://my-bucket/barman/backups
    aws_encryption = AES256
    ```

    This change is part of the effort to unify cloud options between the main
    `barman` CLI and standalone `barman-cloud-*` scripts.
  type: minor_change
  jira_tickets:
    - BAR-1120
