---
- summary: Add aws_sse_kms_key_id configuration option for S3 objects
  description: |
    Introduced a new `aws_sse_kms_key_id` configuration option that allows users to
    specify the server-side encryption key for S3 objects, when using aws_encryption as
    "aws:kms". When set in the server configuration, this value is passed to the S3
    client for all commands that upload objects to cloud object storage.

    This option provides feature parity with the `--sse-kms-key-id` argument from
    `barman-cloud-backup` and `barman-cloud-wal-archive` scripts.

    Example configuration:
    ```
    [myserver]
    backup_method = local-to-cloud
    basebackups_directory = s3://my-bucket/barman/backups
    aws_encryption = aws:kms
    aws_sse_kms_key_id = arn:aws:kms:us-east-1:123456789012:key/abcd1234-5678-90ab-cdef-EXAMPLEKEY
    ```

    This change is part of the effort to unify cloud options between the main
    `barman` CLI and standalone `barman-cloud-*` scripts.
  type: minor_change
  jira_tickets:
    - BAR-1121
