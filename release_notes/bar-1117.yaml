---
- summary: Reuse bandwidth_limit configuration option for cloud backup throttling
  description: |
    Extended the existing `bandwidth_limit` configuration option to also apply
    bandwidth throttling to cloud backup uploads. Previously, this option only
    affected rsync and pg_basebackup operations. Now, when configured for
    local-to-cloud or postgres backup methods with cloud storage, the bandwidth
    limit is automatically applied to cloud uploads as well.

    Example configuration:
    ```
    [myserver]
    backup_method = local-to-cloud
    basebackups_directory = s3://my-bucket/barman/backups
    bandwidth_limit = 5120  # Limit to 5120 kB/s (5 MB/s)
    ```

    This enhancement enables users to control cloud upload speeds to avoid
    saturating network connections, manage cloud egress costs, or comply with
    network policies, using the same configuration option they already use for
    traditional backups.
  type: minor_change
  jira_tickets:
    - BAR-1117
