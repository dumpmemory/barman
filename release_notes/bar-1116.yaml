---
- summary: Add cloud_upload_min_chunk_size configuration option for cloud uploads
  description: |
    Introduced a new `cloud_upload_min_chunk_size` configuration option that allows
    users to specify a minimum chunk size for cloud uploads. When set in the server
    configuration, this value is passed to the cloud storage client used for uploads.
    If not set, the default of the cloud storage client is used (5Mi for S3, 64Ki for
    Azure Blob, N/A for GCS).

    This option provides feature parity with the `--min-chunk-size` argument from
    `barman-cloud-backup` script and supports advanced and non-standard cloud workflows.
    If not set, the default cloud storage client behavior applies.

    Example configuration:
    ```
    [myserver]
    backup_method = local-to-cloud
    basebackups_directory = s3://my-bucket/barman/backups
    cloud_upload_min_chunk_size = 5Mi
    ```

    This change is part of the effort to unify cloud options between the main
    `barman` CLI and standalone `barman-cloud-*` scripts.
  type: minor_change
  jira_tickets:
    - BAR-1116
